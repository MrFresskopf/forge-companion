name: Bug report
description: Report reproducible Forge Companion behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Forge Companion. Remove API tokens, private brew data, comments, UUIDs, and local paths before posting.
  - type: input
    id: version
    attributes:
      label: Forge Companion version
      description: Run `forge-companion --version`.
      placeholder: Forge Companion 0.1.0
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and sanitized output
      description: Replace tokens, brew UUIDs, names, comments, and private paths before pasting.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API tokens and private brewing/account data from this report.
          required: true
